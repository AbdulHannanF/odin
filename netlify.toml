[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# API proxy — must come BEFORE the SPA fallback
[[redirects]]
  from   = "/api/*"
  to     = "http://62.84.187.126:4005/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/ws/*"
  to     = "http://62.84.187.126:4005/ws/:splat"
  status = 200
  force  = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
