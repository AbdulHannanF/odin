version: "3.9"

services:
  # ── PostgreSQL + PostGIS ─────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: odin_postgres
    environment:
      POSTGRES_DB: odin
      POSTGRES_USER: odin_user
      POSTGRES_PASSWORD: odin_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/schemas/postgis_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odin_user -d odin"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Neo4j ────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.19
    container_name: odin_neo4j
    environment:
      NEO4J_AUTH: neo4j/odin_neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: odin_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── ODIN Backend (FastAPI) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: odin_backend
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: odin
      POSTGRES_USER: odin_user
      POSTGRES_PASSWORD: odin_password
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: odin_neo4j_password
      REDIS_URL: redis://redis:6379
      ODIN_LOG_DIR: /app/logs
      ODIN_ENV: development
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY:-}
      USE_SYNTHETIC_WEATHER: ${USE_SYNTHETIC_WEATHER:-true}
      FORCE_WEATHER_API_FAILURE: ${FORCE_WEATHER_API_FAILURE:-false}
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./backend/db/seed_data:/app/seed_data
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn gateway.main:app --host 0.0.0.0 --port 8000 --reload

  # ── ODIN Frontend (React / Vite) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: odin_frontend
    environment:
      VITE_MAPBOX_TOKEN: ${MAPBOX_TOKEN}
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  redis_data:
