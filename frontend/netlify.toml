[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — all routes go to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# API proxy — forward /api/* to your deployed backend
# Replace the `to` URL with your actual backend deployment URL (Railway/Render/Fly)
[[redirects]]
  from   = "/api/*"
  to     = "https://odin-backend.up.railway.app/api/:splat"
  status = 200
  force  = true

[[redirects]]
  from   = "/ws/*"
  to     = "https://odin-backend.up.railway.app/ws/:splat"
  status = 200
  force  = true

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
